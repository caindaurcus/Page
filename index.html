<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Aurcus Online — Community Hub</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700;900&family=Rajdhani:wght@300;400;500;600;700&family=Share+Tech+Mono&display=swap" rel="stylesheet"/>
  
  <link rel="stylesheet" href="style.css"/>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
  <script src="script.js" defer></script>
</head>
<body>

  <div class="bg-grid"></div>
  <div class="bg-glow"></div>
  <div class="bg-particles" id="bgParticles"></div>
  <div id="flash-overlay"></div>

  <div class="lang-selector" id="langSelector">
    <button class="lang-toggle" id="langToggle" title="Cambiar idioma">
      <span class="lang-globe">🌐</span>
      <span class="lang-current" id="langCurrent">ES</span>
      <span class="lang-arrow">▾</span>
    </button>
    <div class="lang-dropdown" id="langDropdown">
      <div class="lang-option" data-lang="ES">Español</div>
      <div class="lang-option" data-lang="EN">English</div>
    </div>
  </div>

  <main class="main-container">
    <header class="hub-header">
      <h1 class="brand-title">AURCUS ONLINE</h1>
      <p class="brand-subtitle">COMMUNITY HUB v6.0</p>
    </header>

    <section class="forum-section">
      <div class="glass-panel text-area-panel">
        <h2 class="panel-title">Crear Publicación</h2>
        <div id="fs" class="status-message"></div>
        <textarea id="fContent" maxlength="300" placeholder="Escribe algo para la comunidad..."></textarea>
        <div class="panel-footer">
          <span id="cc" class="char-counter">0 / 300</span>
          <button id="fPublishBtn" class="btn-primary">Publicar</button>
        </div>
      </div>

      <div id="ff" class="posts-container">
        </div>
    </section>
  </main>

</body>
</html>
